<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply - GetEducate</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body onload="if(!isLoggedIn()) location.href='index.html'">
  <header><!-- same --></header>

  <section class="section">
    <div class="app-step active">
      <img src="logo.png" class="step-logo">
      <h2>Full-Stack Developer</h2>
      <p>Thank you for your interest... Please answer thoroughly.</p>
      <button class="btn" onclick="nextApp()">Apply Now</button>
    </div>

    <div class="app-step">
      <img src="logo.png" class="step-logo">
      <button onclick="backApp()">Back</button>
      <input id="firstName" required placeholder="First Name">
      <input id="lastName" required placeholder="Last Name">
      <input required placeholder="Phone">
      <input required type="email" placeholder="Email">
      <input required placeholder="Instagram">
      <button onclick="nextApp()">Next</button>
    </div>

    <!-- Continue all steps exactly as you described: country, GitHub, referral (radio A/B), age, school (radio), phase 2, income, fullstack exp (radio yes/no → branch), etc. -->
    <!-- Example for branching step -->
    <div class="app-step">
      <img src="logo.png" class="step-logo">
      <p>Last questions. Do you have any prior experience as a Full-Stack Developer?</p>
      <label><input type="radio" name="fullstackExp" value="yes" required> Yes</label>
      <label><input type="radio" name="fullstackExp" value="no"> No</label>
      <button onclick="nextApp()">Next</button>
    </div>

    <!-- Final submit steps lead to submitApplication() -->
  </section>
</body>
</html>
