<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Register - GetEducate</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
  <link href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css" rel="stylesheet">
  <style>
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 80%;
      height: 150%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .auth-container {
      position: relative;
      max-width: 450px;
      width: 100%;
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
      z-index: 1;
      margin: var(--spacing-lg);
    }

    .auth-forms {
      display: flex;
      width: 200%;
      transition: margin-left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .auth-container.active .auth-forms {
      margin-left: -100%;
    }

    .auth-form {
      width: 50%;
      padding: var(--spacing-2xl);
    }

    .auth-title {
      font-size: 1.875rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: var(--spacing-lg);
      position: relative;
      padding-bottom: var(--spacing-sm);
    }

    .auth-title::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 40px;
      height: 3px;
      background: var(--primary);
      border-radius: 10px;
    }

    .input-group {
      position: relative;
      margin-bottom: var(--spacing-lg);
    }

    .input-group.field {
      margin-bottom: var(--spacing-md);
    }

    .input-wrapper {
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 14px 40px;
      border: 2px solid var(--gray-300);
      border-radius: var(--radius-md);
      font-size: 1rem;
      transition: var(--transition);
      outline: none;
    }

    .input-group input:focus {
      border-color: var(--primary);
    }

    .input-group i.icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.25rem;
      color: var(--gray-500);
      transition: var(--transition);
      pointer-events: none;
    }

    .input-group input:focus ~ i.icon {
      color: var(--primary);
    }

    .input-group i.toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.25rem;
      color: var(--gray-500);
      cursor: pointer;
      transition: var(--transition);
    }

    .input-group i.toggle-password:hover {
      color: var(--primary);
    }

    .error-message {
      display: none;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      color: var(--error);
      font-size: 0.875rem;
    }

    .field.invalid .error-message {
      display: flex;
    }

    .field.invalid input {
      border-color: var(--error);
    }

    .auth-button {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      margin-top: var(--spacing-md);
    }

    .auth-button:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .auth-toggle {
      text-align: center;
      margin-top: var(--spacing-lg);
      color: var(--gray-600);
    }

    .auth-toggle a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
      transition: var(--transition);
    }

    .auth-toggle a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    .back-home {
      position: absolute;
      top: var(--spacing-lg);
      left: var(--spacing-lg);
      z-index: 10;
    }

    .back-home a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      color: white;
      text-decoration: none;
      border-radius: var(--radius-md);
      font-weight: 500;
      transition: var(--transition);
    }

    .back-home a:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .verify-container {
      display: none;
      padding: var(--spacing-2xl);
      text-align: center;
    }

    .auth-container.verify-active .auth-forms {
      display: none;
    }

    .auth-container.verify-active .verify-container {
      display: block;
    }

    .verify-code-input {
      width: 100%;
      padding: 14px;
      border: 2px solid var(--gray-300);
      border-radius: var(--radius-md);
      font-size: 1.5rem;
      text-align: center;
      letter-spacing: 8px;
      font-weight: 600;
      margin: var(--spacing-lg) 0;
      transition: var(--transition);
    }

    .verify-code-input:focus {
      border-color: var(--primary);
      outline: none;
    }

    @media (max-width: 768px) {
      .auth-form {
        padding: var(--spacing-lg);
      }

      .back-home {
        top: var(--spacing-md);
        left: var(--spacing-md);
      }
    }
  </style>
</head>
<body>
  <div class="back-home">
    <a href="index.html">
      <i class='bx bx-arrow-back'></i>
      Back to Home
    </a>
  </div>

  <div class="auth-container" id="authContainer">
    <div class="auth-forms">
      <div class="auth-form">
        <h2 class="auth-title">Welcome Back</h2>
        <form id="loginForm">
          <div class="input-group">
            <div class="input-wrapper">
              <input type="email" id="loginEmail" placeholder="Enter your email" required>
              <i class="uil uil-envelope icon"></i>
            </div>
          </div>

          <div class="input-group">
            <div class="input-wrapper">
              <input type="password" id="loginPassword" placeholder="Enter your password" required>
              <i class="uil uil-lock icon"></i>
              <i class="uil uil-eye-slash toggle-password"></i>
            </div>
          </div>

          <button type="submit" class="auth-button">Login</button>

          <div class="auth-toggle">
            Not a member? <a href="#" class="signup-link">Create Account</a>
          </div>
        </form>
      </div>

      <div class="auth-form">
        <h2 class="auth-title">Create Account</h2>
        <form id="signupForm">
          <div class="input-group field email-field">
            <div class="input-wrapper">
              <input type="email" class="email-input" placeholder="Enter your email" required>
              <i class="uil uil-envelope icon"></i>
            </div>
            <span class="error-message">
              <i class='bx bx-error-circle'></i>
              Please enter a valid email
            </span>
          </div>

          <div class="input-group field password-field">
            <div class="input-wrapper">
              <input type="password" class="password-input" placeholder="Create password" required>
              <i class="uil uil-lock icon"></i>
              <i class="uil uil-eye-slash toggle-password"></i>
            </div>
            <span class="error-message">
              <i class='bx bx-error-circle'></i>
              At least 8 characters with uppercase, lowercase, number and symbol
            </span>
          </div>

          <div class="input-group field confirm-password-field">
            <div class="input-wrapper">
              <input type="password" class="confirm-password-input" placeholder="Confirm password" required>
              <i class="uil uil-lock icon"></i>
              <i class="uil uil-eye-slash toggle-password"></i>
            </div>
            <span class="error-message">
              <i class='bx bx-error-circle'></i>
              Passwords don't match
            </span>
          </div>

          <button type="submit" class="auth-button">Sign Up</button>

          <div class="auth-toggle">
            Already a member? <a href="#" class="login-link">Login</a>
          </div>
        </form>
      </div>
    </div>

    <div class="verify-container">
      <h2 class="auth-title" style="text-align: center;">Verify Your Email</h2>
      <p style="color: var(--gray-600); margin-bottom: var(--spacing-lg);">Enter the 4-digit code sent to your email</p>
      <input type="number" id="verifyInput" class="verify-code-input" placeholder="0000" maxlength="4">
      <button onclick="verifyCode()" class="auth-button">Verify & Continue</button>
    </div>
  </div>

  <script>
    const container = document.getElementById('authContainer');

    document.querySelector('.signup-link').addEventListener('click', (e) => {
      e.preventDefault();
      container.classList.add('active');
    });

    document.querySelector('.login-link').addEventListener('click', (e) => {
      e.preventDefault();
      container.classList.remove('active');
    });

    document.querySelectorAll('.toggle-password').forEach(icon => {
      icon.addEventListener('click', () => {
        const input = icon.parentElement.querySelector('input');
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.replace('uil-eye-slash', 'uil-eye');
        } else {
          input.type = 'password';
          icon.classList.replace('uil-eye', 'uil-eye-slash');
        }
      });
    });

    const signupForm = document.getElementById('signupForm');
    const emailField = signupForm.querySelector('.email-field');
    const emailInput = emailField.querySelector('.email-input');
    const passField = signupForm.querySelector('.password-field');
    const passInput = passField.querySelector('.password-input');
    const cPassField = signupForm.querySelector('.confirm-password-field');
    const cPassInput = cPassField.querySelector('.confirm-password-input');

    function checkEmail() {
      const pattern = /^[^\s@]+@[^\s@]+\.[a-z]{2,}$/i;
      if (!emailInput.value.match(pattern)) {
        emailField.classList.add('invalid');
        return false;
      }
      emailField.classList.remove('invalid');
      return true;
    }

    function checkPassword() {
      const pattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
      if (!passInput.value.match(pattern)) {
        passField.classList.add('invalid');
        return false;
      }
      passField.classList.remove('invalid');
      return true;
    }

    function checkConfirmPassword() {
      if (passInput.value !== cPassInput.value || !cPassInput.value) {
        cPassField.classList.add('invalid');
        return false;
      }
      cPassField.classList.remove('invalid');
      return true;
    }

    emailInput.addEventListener('keyup', checkEmail);
    passInput.addEventListener('keyup', checkPassword);
    cPassInput.addEventListener('keyup', checkConfirmPassword);

    signupForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const emailValid = checkEmail();
      const passwordValid = checkPassword();
      const confirmValid = checkConfirmPassword();

      if (emailValid && passwordValid && confirmValid) {
        const code = Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('tempReg', JSON.stringify({
          email: emailInput.value,
          pass: passInput.value,
          code: code
        }));

        alert(`Verification code sent: ${code}\n(This is a demo - in production, this would be sent via email)`);
        container.classList.add('verify-active');
      }
    });

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      const users = JSON.parse(localStorage.getItem('users') || '[]');
      const user = users.find(u => u.email === email && u.pass === password);

      if (user) {
        localStorage.setItem('currentUser', email);
        alert('Successfully logged in!');
        location.href = 'index.html';
      } else {
        alert('Invalid email or password. Please try again.');
      }
    });

    function verifyCode() {
      const input = document.getElementById('verifyInput').value;
      const temp = JSON.parse(localStorage.getItem('tempReg'));

      if (!temp) {
        alert('Session expired. Please try again.');
        location.reload();
        return;
      }

      if (input == temp.code) {
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        users.push({ email: temp.email, pass: temp.pass });
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('currentUser', temp.email);
        localStorage.removeItem('tempReg');

        alert('Account created successfully!');
        location.href = 'index.html';
      } else {
        alert('Invalid verification code. Please try again.');
      }
    }
  </script>
</body>
</html>
