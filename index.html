<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GetEducate - Private Access</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0b0b;
      color: #eaeaea;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      width: 360px;
      background: #141414;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,.6);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 26px;
      text-align: center;
    }
    p {
      margin: 0 0 24px;
      color: #9a9a9a;
      font-size: 14px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 14px;
      background: #0f0f0f;
      border: 1px solid #222;
      border-radius: 8px;
      color: #fff;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }
    .switch {
      margin-top: 16px;
      text-align: center;
      font-size: 13px;
      color: #777;
      cursor: pointer;
    }
    .hidden { display: none; }
    .social {
      margin-top: 24px;
      display: flex;
      gap: 14px;
      justify-content: center;
      font-size: 13px;
    }
    .social a {
      color: #777;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="card" id="register">
  <h1>GetEducate</h1>
  <p>Private access. Members only.</p>

  <input type="email" placeholder="Email" id="regEmail" />
  <input type="password" placeholder="Password" id="regPass" />
  <button onclick="register()">Create Account</button>

  <div class="switch" onclick="toggle()">Already have an account?</div>

  <div class="social">
    <a href="https://www.instagram.com/shukhrat.elmurodovv/" target="_blank">Instagram</a>
    <a href="https://www.youtube.com/@ShukhratElmurodov" target="_blank">YouTube</a>
    <a href="https://x.com/Shukhrat_E" target="_blank">X</a>
    <a href="mailto:elmurodovshuhrat977@gmail.com">Email</a>
  </div>
</div>

<div class="card hidden" id="login">
  <h1>Login</h1>
  <p>Access your account</p>

  <input type="email" placeholder="Email" id="logEmail" />
  <input type="password" placeholder="Password" id="logPass" />
  <button onclick="login()">Login</button>

  <div class="switch" onclick="toggle()">Need an account?</div>

  <div class="social">
    <a href="https://www.instagram.com/shukhrat.elmurodovv/" target="_blank">Instagram</a>
    <a href="https://www.youtube.com/@ShukhratElmurodov" target="_blank">YouTube</a>
    <a href="https://x.com/Shukhrat_E" target="_blank">X</a>
    <a href="mailto:elmurodovshuhrat977@gmail.com">Email</a>
  </div>
</div>

<script>
  function toggle() {
    document.getElementById('register').classList.toggle('hidden');
    document.getElementById('login').classList.toggle('hidden');
  }

  function register() {
    const email = document.getElementById('regEmail').value;
    const pass = document.getElementById('regPass').value;
    if (!email || !pass) return alert('Fill all fields');
    localStorage.setItem(email, pass);
    alert('Registered. Now login.');
    toggle();
  }

  function login() {
    const email = document.getElementById('logEmail').value;
    const pass = document.getElementById('logPass').value;
    const saved = localStorage.getItem(email);
    if (saved === pass) {
      document.body.innerHTML = '<h1 style="color:#4f46e5; text-align:center; margin-top:20vh">Welcome. Private Access.</h1>';
    } else {
      alert('Wrong credentials');
    }
  }
</script>

</body>
</html>
